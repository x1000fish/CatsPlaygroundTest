        .func-btn { width: 100%; margin-top: 5px; padding: 10px; border-radius: 35px; font-weight: 900; font-size: 16px; border: 2.5px solid #463438; cursor: pointer; box-shadow: 0 4px 0 rgba(70,52,56,0.1); }
        .btn-reset { background: #FFF9F0; color: #463438; }

        .func-btn:hover { background-color: #FFB7C5 !important; color: #fff !important; border-color: #463438 !important; box-shadow: 0 3px 0 #463438 !important; transform: translateY(-2px); }   
        #pro-panel { width: 0; opacity: 0; height: 500px; overflow: hidden; background: #ffffff; border: 0px solid #463438; border-radius: 40px; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .pro-active #pro-panel { width: 320px; opacity: 1; border: 8px solid #463438; padding: 12px 20px 20px 20px; box-shadow: 10px 10px 0px #99C44D; }
        .panel-section-title { font-weight: 900; font-size: 18px; margin-bottom: 6px; margin-top: 6px; color: #463438; text-align: center; white-space: nowrap; overflow: hidden; }

        .pro-active #node-1, .pro-active #node-3 { left: 405px !important; }

        .pro-active .line-v:nth-of-type(3) { left: 130px !important; }
        .pro-active .line-v:nth-of-type(4) { left: 470px !important; }
        .pro-active #fish-0, .pro-active #fish-2 { left: 95px; }
        .pro-active #fish-1, .pro-active #fish-3 { left: 435px; }  
        #circuit-area { width: 900px; height: 0; opacity: 0; background: #ffffff; border: 0px solid #463438; border-radius: 30px; margin-top: 20px; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); position: relative; padding: 0 15px; overflow: hidden; touch-action: pan-x; overscroll-behavior-y: none; }
        .pro-active #circuit-area { height: 170px; opacity: 1; border: 8px solid #463438; padding: 15px; box-shadow: 10px 10px 0px #FFB7C5; }
        .circuit-title { text-align: center; font-weight: 900; font-size: 1.25rem; margin-bottom: 7px; color: #463438; }
        #circuit-content-wrapper { position: relative; height: 130px; overflow-x: auto !important; overflow-y: hidden; margin-left: 30px; padding-top: 4px; scroll-behavior: auto; touch-action: pan-x; overscroll-behavior-y: none; }
        #circuit-content-wrapper::-webkit-scrollbar { display: none; }
        #circuit-content { display: flex; height: 100%; padding: 0 7px; min-width: 100%; width: max-content; position: relative; background-image: linear-gradient(#463438, #463438), linear-gradient(#463438, #463438); background-size: 100% 3px; background-repeat: no-repeat; background-position: 0 20px, 0 60px; }

        .qubit-label { position: absolute; left: 12px; font-weight: 900; font-size: 16px; color: #463438; z-index: 5; }

        .circuit-unit.selected { background-color: var(--bg-hover) !important; border: 3px solid var(--border-color) !important; border-radius: 12px; }

        .control-dot { width: 14px; height: 14px; background: #463438; border-radius: 50%; position: absolute; z-index: 5; }

        .progress-bar-fill::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: linear-gradient(45deg, rgba(255,255,255,0.25) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.25) 50%, rgba(255,255,255,0.25) 75%, transparent 75%, transparent); background-size: 30px 30px; animation: stripeMove 1s linear infinite; }
        @keyframes stripeMove { 0% { background-position: 0 0; } 100% { background-position: 30px 0; } }
        .progress-text { position: relative; z-index: 5; font-weight: 900; color: #463438; font-size: 14px; letter-spacing: 1px; }
        .progress-thumb { position: absolute; top: 50%; left: 0%; transform: translate(-50%, -50%); width: 70px; height: auto; z-index: 5; transition: left 0.5s cubic-bezier(0.16, 1, 0.3, 1); filter: drop-shadow(2px 2px 0px rgba(70,52,56,0.5)); }

    <script>
        let labelsOpen = false;
        function toggleLabels() {
            
            if (typeof pop !== 'undefined') { pop.currentTime = 0; pop.play(); }
            labelsOpen = !labelsOpen;
            const root = document.getElementById('body-root') || document.body;
            const btn = document.getElementById('label-toggle-btn');
            root.classList.toggle('hide-labels', !labelsOpen);
            if (btn) btn.innerHTML = labelsOpen ? '&#128683;' : '&#127991;&#65039;';
        }
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyv3aQZO44pLQ7rr10pv0cOeJs-vdZehlABjrcJhQNQi9AWsGUutM7KXNFKPbFliqjWLA/exec';
        let steps = 0, time = 0, isPro = false, fishAtNode = [3, 2, 1, 0], gateHistory = [], timerInterval, isSolved = false;
        const PROGRESS_TOTAL = 4;
        const PROGRESS_DEFAULT_CODE = '011';

        function getMatchedCount() {
            return fishAtNode.reduce((count, pos, index) => count + (pos === index ? 1 : 0), 0);
        }

        function updateProgressImages() {
            const skin = typeof currentSkin === 'undefined' ? 'default' : currentSkin;
            const zeroBasedIndex = PROGRESS_TOTAL - 1;
            let catSrc = `./svg/${PROGRESS_DEFAULT_CODE}-c.svg`;
            let fishSrc = `./svg/${PROGRESS_DEFAULT_CODE}-f.svg`;
            if (skin === 'rip') {
                catSrc = `./RIP/Cat${PROGRESS_TOTAL}.png`;
                fishSrc = `./RIP/Fish${PROGRESS_TOTAL}.png`;
            } else if (skin === 'poto') {
                catSrc = `./poto/cat${zeroBasedIndex}.png`;
                fishSrc = `./poto/fish${zeroBasedIndex}.png`;
            } else if (skin === 'mj') {
                catSrc = `./mj/Cat${zeroBasedIndex}.png`;
                fishSrc = `./mj/Fish${zeroBasedIndex}.png`;
            }
            const thumb = document.getElementById('progress-thumb');
            const target = document.getElementById('progress-target');
            if (thumb) thumb.src = catSrc;
            if (target) target.src = fishSrc;
        }

        function updateProgressBar(count) {
            const fill = document.getElementById('progress-bar-fill');
            const text = document.getElementById('progress-text');
            const thumb = document.getElementById('progress-thumb');
            const wrapper = document.querySelector('.progress-bar-wrapper');
            if (!fill || !text || !thumb || !wrapper) return;
            const percent = (count / PROGRESS_TOTAL) * 100;
            fill.style.width = percent + '%';
            thumb.style.left = percent + '%';
            text.innerText = `${count} / ${PROGRESS_TOTAL}`;
            wrapper.classList.toggle('progress-win', count === PROGRESS_TOTAL);
        }

        const originalProgressUpdateFishUI = updateFishUI;
        updateFishUI = function() {
            originalProgressUpdateFishUI.apply(this, arguments);
            updateProgressBar(getMatchedCount());
        };

        window.addEventListener('load', () => {
            updateProgressImages();
            updateProgressBar(getMatchedCount());
        });

        let historyStack = [[]];
        let selectedIndices = [];
        let isMode2 = false;
        let leaderboardData = [];
        let draggedIndex = null;
        let currentDragGhost = null;
        let isTouchDevice = ('ontouchstart' in window || navigator.maxTouchPoints > 0);
        let isQuantumMode = false;
        let autoScrollRAF = null;
        let scrollSpeed = 0;       
        const pop = new Audio('pop.m4a'), meow = new Audio('meow.m4a');
        function updateScrollSpeed(clientX) {
            const wrapper = document.getElementById('circuit-content-wrapper');
            if (!wrapper) return;
            const rect = wrapper.getBoundingClientRect();
            const edgeThreshold = 150;
            const maxSpeed = 5;

            if (clientX < rect.left + edgeThreshold || clientX < edgeThreshold) {
                scrollSpeed = -maxSpeed;
                if (!autoScrollRAF) autoScrollRAF = requestAnimationFrame(scrollLoop);
            } else if (clientX > rect.right - edgeThreshold || clientX > window.innerWidth - edgeThreshold) {
                scrollSpeed = maxSpeed;
                if (!autoScrollRAF) autoScrollRAF = requestAnimationFrame(scrollLoop);
            } else {
                scrollSpeed = 0;
            }
        }
        function scrollLoop() {
            const wrapper = document.getElementById('circuit-content-wrapper');
            if (scrollSpeed !== 0) {
                wrapper.scrollLeft += scrollSpeed;
                autoScrollRAF = requestAnimationFrame(scrollLoop);
            } else {
                autoScrollRAF = null;
            }
        }
        window.onload = () => {
            updateFishUI();
            const fishes = document.querySelectorAll('.fish-wrapper');
            fishes.forEach(fw => fw.classList.add('fish-ready'));
            setTimeout(() => { fishes.forEach(fw => fw.classList.add('fish-animate')); }, 50); 
            timerInterval = setInterval(() => { time++; document.getElementById('timer').innerText = time; }, 1000);     
            document.getElementById('quantum-toggle').innerText = isQuantumMode ? "🧊" : "⚛️";
            document.getElementById('body-root').classList.toggle('mini-mode', !isQuantumMode);    
            updateLabels();
            updateGateButtonsUI();
            updateUndoStatus();
            fetchLeaderboard();   
            const circuitWrapper = document.getElementById('circuit-content-wrapper');
            circuitWrapper.addEventListener('wheel', (e) => { 
                if (Math.abs(e.deltaY) > 0) {
                    e.preventDefault(); 
                    circuitWrapper.scrollLeft += e.deltaY; 
                }
            }, { passive: false });    
            circuitWrapper.addEventListener('mousemove', (e) => {
                updateScrollSpeed(e.clientX);
            });
            circuitWrapper.addEventListener('mouseleave', () => { 
                if (draggedIndex === null) scrollSpeed = 0; 
            });
            document.addEventListener('dragover', (e) => {
                if (draggedIndex !== null) {
                    updateScrollSpeed(e.clientX);
                }
            });
            document.addEventListener('dragend', () => {
                scrollSpeed = 0;
            });
        };
        function updateLabels() {
            const isCube = !isQuantumMode;
            document.getElementById('panel-title-gates').innerText = isCube ? 'Transformations' : 'Quantum Gate';
            document.getElementById('circuit-title-text').innerText = isCube ? 'Paths' : 'Circuit Diagram';
            document.getElementById('q-label-0').innerText = isCube ? 'd1' : 'q0';
            document.getElementById('q-label-1').innerText = isCube ? 'd2' : 'q1';
        }
        
        function getRgba(hex, alpha) {
            hex = hex.replace('#', '');
            const r = parseInt(hex.substring(0,2), 16), g = parseInt(hex.substring(2,4), 16), b = parseInt(hex.substring(4,6), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }
        function getGateColorMap(type) {
            if (type.startsWith('X')) return '#e2de6e'; 
            return '#629eed'; 
        }
        function toggleLeaderboard() {
            const wrapper = document.getElementById('leaderboard-wrapper');
            wrapper.classList.toggle('expanded');
        }
        function handleDragStart(e, index, el) {
            if (isSolved) return;
            draggedIndex = index;
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', index.toString());      
            if (currentDragGhost && currentDragGhost.parentNode) {
                currentDragGhost.parentNode.removeChild(currentDragGhost);
            }
            currentDragGhost = el.cloneNode(true);
            currentDragGhost.style.position = 'absolute';
            currentDragGhost.style.top = '-10000px';
            currentDragGhost.style.left = '-10000px';
            currentDragGhost.style.backgroundColor = 'transparent';
            currentDragGhost.style.border = 'none';
            currentDragGhost.classList.remove('selected');
            document.body.appendChild(currentDragGhost);
            
            e.dataTransfer.setDragImage(currentDragGhost, el.offsetWidth / 2, el.offsetHeight / 2);

            setTimeout(() => { el.style.opacity = '0.01'; }, 0);
        }
        async function fetchLeaderboard() {
            const listArea = document.getElementById('rankList');
            try {
                const response = await fetch(`${SCRIPT_URL}?action=getLeaderboard&level=4`);
                const data = await response.json();
                if (data && Array.isArray(data) && data.length > 0) {
                    leaderboardData = data;
                    renderRank('steps');
                } else {
                    listArea.innerHTML = '<p class="text-center italic text-gray-400 mt-10 text-sm">No records yet</p>';
                }
            } catch (e) {
                listArea.innerHTML = '<p class="text-center italic text-red-400 mt-10 text-sm">Load Error</p>';
            }
        }
        function renderRank(type) {
            const tabSteps = document.getElementById('tab-steps');
            const tabTime = document.getElementById('tab-time');
            const listArea = document.getElementById('rankList');
            if (type === 'steps') {
                tabSteps.className = 'rank-tab active';
                tabTime.className = 'rank-tab bg-gray-100';
            } else {
                tabSteps.className = 'rank-tab bg-gray-100';
                tabTime.className = 'rank-tab active';
            }
            if (!leaderboardData || leaderboardData.length === 0) return;
            const sorted = [...leaderboardData].sort((a, b) => a[type] - b[type]);
            let html = "";
            sorted.slice(0, 10).forEach((item, index) => {
                const medal = index === 0 ? "🥇" : index === 1 ? "🥈" : index === 2 ? "🥉" : (index + 1) + ".";
                const displayName = item.username || item.name || 'Anonymous';
                const displayValue = type === 'steps' ? item.steps + '🐾' : item.time + 's';
                const av=item.photo?`<img src="${item.photo}" alt="" style="width:100%;height:100%;object-fit:cover;object-position:${item.photoX||50}% ${item.photoY||50}%;transform-origin:${item.photoX||50}% ${item.photoY||50}%;transform:scale(${item.photoScale||1});">`:'🐱'; html += `<div class="rank-item"><div class="rank-avatar-sm">${av}</div><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;">${medal} ${displayName}</span><span style="flex-shrink:0;color:#5ba4cf;">${displayValue}</span></div>`;
            });
            listArea.innerHTML = html;
        }
        function toggleMode2() {
            pop.currentTime = 0; pop.play();
            isMode2 = !isMode2;
            const btn = document.getElementById('mode-2-btn');
            btn.innerText = isMode2 ? "Mode: 2" : "Mode: 1";
            btn.classList.toggle('active-mode', isMode2);
        }    
        function toggleQuantumMode() {
            pop.currentTime = 0; pop.play();
            isQuantumMode = !isQuantumMode;
            document.getElementById('body-root').classList.toggle('mini-mode', !isQuantumMode);
            document.getElementById('quantum-toggle').innerText = isQuantumMode ? "🧊" : "⚛️";
            updateLabels();
            updateGateButtonsUI();
            renderCircuit();
        }
        const gateLineMap = {
            X0: ['line-v-0', 'line-v-1'],
            X1: ['line-h-0', 'line-h-1'],
            C0X01: ['line-h-0'],
            CX01: ['line-h-1'],
            C0X10: ['line-v-0'],
            CX10: ['line-v-1']
        };
        function toggleLineHighlight(lineIds, isOn) {
            lineIds.forEach(id => document.getElementById(id)?.classList.toggle('line-highlight', isOn));
        }
        function getGateForLine(lineId) {
            if (isMode2) {
                if (lineId.includes('h')) return 'X1';
                if (lineId.includes('v')) return 'X0';
            } else {
                if (lineId === 'line-h-0') return 'C0X01';
                if (lineId === 'line-h-1') return 'CX01';
                if (lineId === 'line-v-0') return 'C0X10';
                if (lineId === 'line-v-1') return 'CX10';
            }
            return null;
        }
        function syncHighlight(lineId, isOn) {
            const gate = getGateForLine(lineId);
            if (!gate) return;
            toggleLineHighlight(gateLineMap[gate] || [], isOn);
            const btn = document.getElementById('gate-' + gate.toLowerCase());
            if (btn) {
                if (isOn) btn.classList.add('btn-highlight');
                else btn.classList.remove('btn-highlight');
            }
        }
        function syncGateHighlight(gate, isOn) {
            toggleLineHighlight(gateLineMap[gate] || [], isOn);
            const btn = document.getElementById('gate-' + gate.toLowerCase());
            if (btn) {
                if (isOn) btn.classList.add('btn-highlight');
                else btn.classList.remove('btn-highlight');
            }
        }
        function handleLineClick(lineId) {
            if (isSolved) return;
            const gate = getGateForLine(lineId);
            if (gate) applyGate(gate);
        }

                let newHistory = [];

        function getPermutation(g) {
            return [0, 1, 2, 3].map(pos => {
                let q0 = Math.floor(pos / 2), q1 = pos % 2;
                if (g === 'X0') q0 = 1 - q0;
                else if (g === 'X1') q1 = 1 - q1;
                else if (g === 'CX01' && q0 === 1) q1 = 1 - q1;
                else if (g === 'C0X01' && q0 === 0) q1 = 1 - q1;
                else if (g === 'CX10' && q1 === 1) q0 = 1 - q0;
                else if (g === 'C0X10' && q1 === 0) q0 = 1 - q0;
                return q0 * 2 + q1;
            });
        }

            const edges = [ [0, 1], [0, 2], [1, 3], [2, 3] ];

        const SKIN_STORAGE_KEY = 'meowtopiaSkin';
        const AVAILABLE_SKINS = ['default', 'rip', 'poto', 'mj'];
        let currentSkin = AVAILABLE_SKINS.includes(sessionStorage.getItem(SKIN_STORAGE_KEY)) ? sessionStorage.getItem(SKIN_STORAGE_KEY) : 'default';
        let currentSidePanel = 'rank';
        function getSkinSpriteCount() {
            return Math.max(
                document.querySelectorAll('.node[id^="node-"]').length,
                document.querySelectorAll('.fish-wrapper[id^="fish-"]').length
            );
        }
        function getSkinBits(index, count) {
            return index.toString(2).padStart(count > 8 ? 4 : count > 4 ? 3 : 2, '0');
        }
        function defaultSkinCode(index, count) {
            const bits = getSkinBits(index, count);
            if (count > 8) return '0' + bits.slice(2);
            if (count > 4) return bits;
            return '0' + bits;
        }
        function defaultSkinHat(kind, index, count) {
            if (count <= 8) return '';
            const bits = getSkinBits(index, count);
            if (bits[1] !== '1') return '';
            const asset = kind === 'cat' ? 'hat-c' : 'hat-f';
            const cls = kind === 'cat' ? 'cat-hat' : 'fish-hat';
            return '<img src="./svg/' + asset + '.svg" class="hat-img ' + cls + '" alt="">';
        }
        function defaultSkinFaded(index, count) {
            return count > 8 && getSkinBits(index, count)[0] === '1' ? ' bit-faded' : '';
        }
        function skinAssetHtml(kind, index, count, label) {
            const text = label || getSkinBits(index, count);
            const spriteClass = kind === 'cat' ? 'skin-cat' : 'fish-img';
            if (currentSkin === 'rip') {
                const assetIndex = index + 1;
                const name = kind === 'cat' ? 'Cat' : 'Fish';
                return '<img src="./RIP/' + name + assetIndex + '.png" class="' + spriteClass + '" alt="' + text + ' ' + kind + '">';
            }
            if (currentSkin === 'poto') {
                const name = kind === 'cat' ? 'cat' : 'fish';
                return '<img src="./poto/' + name + index + '.png" class="' + spriteClass + '" alt="' + text + ' ' + kind + '">';
            }
            if (currentSkin === 'mj') {
                const name = kind === 'cat' ? 'Cat' : 'Fish';
                return '<img src="./mj/' + name + index + '.png" class="' + spriteClass + '" alt="' + text + ' ' + kind + '">';
            }
            const code = defaultSkinCode(index, count);
            const faded = defaultSkinFaded(index, count);
            if (kind === 'cat') {
                return defaultSkinHat('cat', index, count) + '<img src="./svg/' + code + '-c.svg" class="skin-cat encoded-img' + faded + '" alt="' + text + ' cat">';
            }
            const fishSrc = './svg/' + code + '-f.svg';
            return defaultSkinHat('fish', index, count) + '<img src="' + fishSrc + '" class="fish-bg-shape encoded-img' + faded + '" alt=""><img src="' + fishSrc + '" class="fish-img encoded-img' + faded + '" alt="' + text + ' fish">';
        }
        function applySkinClass() {
            const root = document.getElementById('body-root') || document.body;
            root.classList.toggle('skin-rip', currentSkin === 'rip');
            root.classList.toggle('skin-poto', currentSkin === 'poto');
            root.classList.toggle('skin-mj', currentSkin === 'mj');
            ['default', 'rip', 'poto', 'mj'].forEach(skin => {
                const option = document.getElementById('skin-option-' + skin);
                if (option) option.classList.toggle('active', currentSkin === skin);
            });
        }
        function refreshSkinAssets() {
            applySkinClass();
            const count = getSkinSpriteCount();
            for (let i = 0; i < count; i++) {
                const node = document.getElementById('node-' + i);
                const fish = document.getElementById('fish-' + i);
                const nodeLabel = (node && node.querySelector('.fixed-number') && node.querySelector('.fixed-number').textContent) || getSkinBits(i, count);
                const fishLabel = (fish && fish.querySelector('.fish-label') && fish.querySelector('.fish-label').textContent) || getSkinBits(i, count);
                if (node) {
                    node.innerHTML = '<div class="fixed-number">' + nodeLabel + '</div>' + skinAssetHtml('cat', i, count, nodeLabel);
                }
                if (fish) {
                    fish.innerHTML = '<div class="fish-label">' + fishLabel + '</div>' + skinAssetHtml('fish', i, count, fishLabel);
                }
            }
        }
        function setSidePanel(panel) {
            if (!['rank', 'skin'].includes(panel)) panel = 'rank';
            currentSidePanel = panel;
            const rankPanel = document.getElementById('rank-panel');
            const skinPanel = document.getElementById('skin-panel');
            const rankBookmark = document.getElementById('rank-bookmark');
            const skinBookmark = document.getElementById('skin-bookmark');
            if (rankPanel) rankPanel.classList.toggle('hidden', panel !== 'rank');
            if (skinPanel) skinPanel.classList.toggle('hidden', panel !== 'skin');
            if (rankBookmark) rankBookmark.classList.toggle('active', panel === 'rank');
            if (skinBookmark) skinBookmark.classList.toggle('active', panel === 'skin');
        }
        function toggleSidePanel(panel) {
            const wrapper = document.getElementById('leaderboard-wrapper');
            if (!wrapper) return;
            const isExpanded = wrapper.classList.contains('expanded');
            if (currentSidePanel === panel && isExpanded) {
                wrapper.classList.remove('expanded');
                return;
            }
            setSidePanel(panel);
            wrapper.classList.add('expanded');
            if (panel === 'rank' && typeof showRankChampion === 'function') {
                window.setTimeout(() => showRankChampion(typeof activeRankType === 'undefined' ? 'steps' : activeRankType), 380);
            }
        }
        function toggleLeaderboard() {
            toggleSidePanel('rank');
        }
        function selectSkin(skin) {
            if (!AVAILABLE_SKINS.includes(skin)) skin = 'default';
            currentSkin = skin;
            sessionStorage.setItem(SKIN_STORAGE_KEY, skin);
            if (typeof updateProgressImages === 'function') updateProgressImages();
            refreshSkinAssets();
            if (typeof updateFishUI === 'function') updateFishUI();
        }
        (function wrapSkinOnload() {
            const originalOnload = window.onload;
            window.onload = function (event) {
                if (typeof originalOnload === 'function') originalOnload.call(window, event);
                refreshSkinAssets();
                if (typeof updateFishUI === 'function') updateFishUI();
            };
        })();
</script>
</body>
</html>
