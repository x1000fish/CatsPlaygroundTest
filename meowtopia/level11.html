<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, user-scalable=no, viewport-fit=cover">
    <title>Meowtopia - Level 11</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Gaegu:wght@700&family=Titan+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Shrikhand&family=Alfa+Slab+One&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #FFF9F0; background-image: linear-gradient(45deg, #fce4ec 25%, transparent 25%, transparent 50%, #fce4ec 50%, #fce4ec 75%, transparent 75%, transparent); background-size: 100px 100px; color: #463438; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
        .hidden { display: none !important; }
        .main-layout { display: flex; align-items: flex-start; justify-content: center; gap: 20px; margin-top: 20px; }
        .game-canvas { position: relative; width: 1900px; height: 550px; background: #fffaf5; border: 8px solid #463438; border-radius: 40px; overflow: hidden; box-shadow: 15px 15px 0px #FFB7C5; }
        #leaderboard-wrapper { position: fixed; left: -220px; top: 50px; transform: none; display: flex; z-index: 150; transition: left 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        #leaderboard-wrapper.expanded {left: 0; }
        .side-leaderboard-content { width: 220px; height: 450px; max-height: calc(100vh - 90px); background: white; border: 6px solid #463438; border-left: none; border-radius: 0 30px 30px 0; padding: 15px; display: flex; flex-direction: column; position: relative; z-index: 2; }
        .bookmark-tab { position: absolute; right: -45px; width: 45px; height: 130px; background: #463438; border: 5px solid #463438; border-left: none; border-radius: 0 15px 15px 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s, right 0.2s, width 0.2s; z-index: 1; }
        .bookmark-tab.rank-bookmark { top: 40px; border-radius: 0 15px 15px 0; background: #514749;}
        .bookmark-tab.skin-bookmark { top: 170px; height: 118px; border-radius: 0 15px 15px 0; background: #7d6961; }
        .bookmark-tab:hover { background: #FFB7C5; width: 55px; right: -55px; }
        #leaderboard-wrapper.expanded .bookmark-tab.active { background: #FFB7C5; }
        .bookmark-text { writing-mode: vertical-lr; color: white; font-weight: 900; font-size: 20px; text-shadow: 2px 2px 0 #463438; letter-spacing: 4px; user-select: none; }
        #rankList { padding-top: 10px; }
        #rankList::-webkit-scrollbar { width: 6px; }
        #rankList::-webkit-scrollbar-thumb { background-color: #FFB7C5; border-radius: 10px; }
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 2px; border-bottom: 2px solid #fce4ec; font-weight: 900; font-size: 14px; gap: 8px; color: #463438; }
        .rank-item:last-child { border-bottom: none; }
        .rank-item > span:first-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .rank-item span:last-child { flex-shrink: 0; }
        .rank-tab { flex: 1; padding: 6px 4px; font-size: 12px; font-weight: 900; border: 3px solid #463438; border-radius: 12px; cursor: pointer; transition: all 0.12s; text-align: center; background: #fff; color: #463438; }
        .rank-tab.active { background: #463438; color: #fff; }
        .rank-avatar-sm { width: 28px; height: 28px; flex: 0 0 28px; border: 2px solid #463438; border-radius: 50%; background: #fff9f0; display: flex; align-items: center; justify-content: center; overflow: hidden; font-size: 0.9rem; }
        .rank-avatar-sm img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .rank-player-main { display: flex; align-items: center; gap: 7px; flex: 1; min-width: 0; }
        .rank-number { width: 28px; flex: 0 0 28px; text-align: right; font-weight: 900; color: #463438; }
        .rank-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
        .rank-avatar-wrap { position: relative; width: 28px; height: 28px; flex: 0 0 28px; }
        .rank-avatar-wrap .rank-avatar-sm { width: 100%; height: 100%; }
        
        .rank-champion-toast .rank-avatar-wrap { width: 58px; height: 58px; flex: 0 0 58px; }
        .rank-item.rank-champion .rank-avatar-sm { border-color: #f4c542; box-shadow: 0 0 0 3px rgba(244,197,66,0.32); }
        .rank-crown { position: absolute; top: -12px; left: 50%; transform: translateX(-50%) rotate(-8deg); font-size: 18px; line-height: 1; filter: drop-shadow(0 2px 0 rgba(70,52,56,0.35)); pointer-events: none; }
        .rank-champion-backdrop { position: fixed; inset: 0; background: rgba(255, 249, 240, 0.46); opacity: 0; z-index: 120; pointer-events: none; transition: opacity 0.2s ease; }
        .rank-champion-backdrop.show { opacity: 1; }
        .rank-champion-toast { position: fixed; left: 12px; top: 108px; transform: translate(0, -50%) scale(0.82); opacity: 0; z-index: 3000; background: #fffaf5; border: 6px solid #463438; border-radius: 22px; padding: 10px 14px; display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 0 #FFB7C5; color: #463438; pointer-events: none; transform-origin: left center; }
        .rank-champion-toast.show { animation: rankChampionPop 1.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .rank-champion-toast .rank-avatar-sm { width: 58px; height: 58px; flex-basis: 58px; border-width: 4px; }
        .rank-champion-text { display: flex; flex-direction: column; line-height: 1.05; }
        .rank-champion-label { font-size: 12px; font-weight: 900; color: #5ba4cf; letter-spacing: 0; }
        .rank-champion-name { max-width: 190px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 24px; font-weight: 900; }
        @keyframes rankChampionPop { 0% { opacity: 0; transform: translate(0, -50%) scale(0.82); } 20% { opacity: 1; transform: translate(0, -62%) scale(1.05); } 68% { opacity: 1; transform: translate(0, -62%) scale(1); } 100% { opacity: 0; transform: translate(0, -50%) scale(0.82); } }

        /* 防止圖層干擾點擊 */
        #nodes-layer, #fishes-layer { pointer-events: none; }
        
        .node { width: 100px; height: 100px; background: white; border: 5px solid #463438; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: absolute; box-shadow: 3px 3px 0 #463438; z-index: 20; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); pointer-events: none; }
        .node img { width: 76px; height: auto; pointer-events: none; transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .node img.encoded-img { transform: translate(-2px, -5px); }
        .encoded-img { transition: filter 0.25s ease; }
        .node img.encoded-img.bit-faded { filter: grayscale(1) saturate(0) brightness(0.95) contrast(0.72); }
        .fish-wrapper img.fish-img.bit-faded { filter: grayscale(1) saturate(0) brightness(0.95) contrast(0.72); }
        .fixed-number { position: absolute; bottom: -2px; right: 25px; font-size: 15px; font-weight: 900; color: #463438; pointer-events: none; z-index: 25; }
        .node-dist-badge { position: absolute; background: #FFB800; color: #463438; width: 26px; height: 26px; border-radius: 50%; border: 3px solid #463438; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; box-shadow: 2px 2px 0 rgba(70,52,56,0.5); pointer-events: none; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        
        .connection-line { position: absolute; background: #463438; z-index: 10; cursor: pointer; transition: all 0.2s ease; opacity: 1; touch-action: none; pointer-events: auto; }
        /* 恢復為 -10px */
        .connection-line::after { content: ''; position: absolute; top: -10px; bottom: -10px; left: 0; right: 0; background: transparent; z-index: 10; }
        @media (hover: hover) { .connection-line:hover { background: #99C44D !important; box-shadow: 0 0 15px rgba(153, 196, 77, 0.8); height: 10px !important; z-index: 16 !important; opacity: 1 !important; border-top: none !important; } }
        .line-highlight { background: #99C44D !important; box-shadow: 0 0 15px rgba(153, 196, 77, 0.8) !important; height: 8px !important; z-index: 15 !important; border-top: none !important; opacity: 1 !important; }
        
        .fish-wrapper { position: absolute; width: 70px; height: 70px; pointer-events: none; z-index: 30; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .fish-wrapper.feature-highlight { z-index: 55 !important; }
        .fish-wrapper img.fish-img { width: 49px; height: auto; position: relative; z-index: 2; transform: translateY(-3px); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .fish-wrapper img.fish-bg-shape { width: 49px; height: auto; position: absolute; z-index: 1; filter: brightness(0) invert(1);opacity: 1; transform: translateY(-3px); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .fish-wrapper img.fish-bg-shape.bit-faded { opacity: 1; }
        .fish-label { background: rgba(70, 52, 56, 0.8); color: #fff; width: 32px; height: 22px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; z-index: 5; position: absolute; top: 25px; pointer-events: none; }  
        .hat-img { position: absolute; height: auto; pointer-events: none; z-index: 21; }
        .cat-hat { width: 31px !important; top: 6px; left: 50px; transform: translateX(-50%) rotate(0deg); }
        .fish-hat { width: 19px; top: 13px; left: 45%; transform: translateX(-50%) rotate(-10deg); z-index: 31; }
        
        #pro-panel { width: 0; opacity: 0; height: 550px; overflow: hidden; background: #fff; border: 0px solid #463438; border-radius: 40px; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .pro-active #pro-panel { width: 600px; opacity: 1; border: 8px solid #463438; padding: 15px; box-shadow: 10px 10px 0px #99C44D; }
        .panel-section-title { font-weight: 900; font-size: 18px; margin: 5px 0; color: #463438; text-align: center; white-space: nowrap; }
        .game-btn { cursor: pointer; border: 5px solid #463438; border-radius: 60px; padding: 12px; font-size: 26px; font-weight: 900; color: #fff; text-shadow: 2px 2px 0 #463438; box-shadow: 0 6px 0 #463438; position: relative; transition: all 0.1s; display: inline-block; -webkit-user-select: none; user-select: none; }
        .game-btn:active { top: 6px; box-shadow: 0 2px 0 #463438; }
        .btn-red { background: #FFB7C5; }
        .btn-green { background: #99C44D; }
        .btn-blue { background: #5BA4CF; }
        .multi-toggle-btn { background: #e2de6e; border: 4px solid #463438; border-radius: 20px; padding: 5px 15px; font-weight: 900; font-size: 20px; color: white; cursor: pointer; box-shadow: 0 4px 0 #463438; transition: all 0.1s; min-width: 140px; text-shadow: 2px 2px 0 #463438; }
        .multi-toggle-btn.mode-2 { background: #629eed; }
        .multi-toggle-btn.mode-4 { background: #b583e5; }
        .multi-toggle-btn.mode-8 { background: #46c89d; }
        .multi-toggle-btn:hover, .game-btn:hover, .mode-toggle-fixed:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #463438; }
        .multi-toggle-btn:active, .mode-toggle-fixed:active { transform: translateY(2px); box-shadow: 0 2px 0 #463438; }
        .func-btn { width: 100%; margin-top: 5px; padding: 14px; border-radius: 35px; font-weight: 900; font-size: 16px; border: 2.5px solid #463438; cursor: pointer; box-shadow: 0 4px 0 rgba(70,52,56,0.1); background: #fff; color: #463438; }
        .btn-reset { background: #FFF9F0; color: #463438; }
        .btn-undo { background: #FFB7C5 !important; color: #fff !important; border: 2.5px solid #463438 !important; opacity: 0.6; cursor: not-allowed; pointer-events: none; }
        .btn-undo.active { background: #FFB7C5 !important; border-color: #463438 !important; color: #fff !important; opacity: 1; cursor: pointer; box-shadow: 0 4px 0 #463438; pointer-events: auto; }
        .func-btn:hover { background-color: #FFB7C5 !important; color: #fff !important; border-color: #463438 !important; transform: translateY(-2px); box-shadow: 0 3px 0 #463438; }
        .btn-undo.active:hover { background-color: #ff9fb2 !important; }
        #circuit-area { width: 1155px; height: 0; opacity: 0; background: #fff; border: 0px solid #463438; border-radius: 30px; margin-top: 20px; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); position: relative; overflow: hidden; }
        .pro-active #circuit-area { height: 250px; opacity: 1; border: 8px solid #463438; padding: 15px; box-shadow: 10px 10px 0px #FFB7C5; }
        #circuit-content-wrapper { position: relative; height: 180px; overflow-x: auto; margin-left: 45px; scrollbar-width: none; touch-action: pan-x; }
        #circuit-content-wrapper::-webkit-scrollbar { display: none; }
        #circuit-content { display: flex; height: 100%; padding: 0 10px 0 0; min-width: 100%; width: max-content; position: relative; background-image: linear-gradient(#463438,#463438), linear-gradient(#463438,#463438), linear-gradient(#463438,#463438), linear-gradient(#463438,#463438); background-size: 100% 3px; background-repeat: no-repeat; background-position: 0 30px, 0 70px, 0 110px, 0 150px; }
        .mini-mode #circuit-content { background-image: none !important; }
        
        .circuit-qubit-label { position: absolute; left: 19px; font-weight: 900; font-size: 16px; color: #463438; transition: transform 0.2s; display: flex; align-items: center; justify-content: center; width: 30px; height: 30px; transform: translateY(-7px); user-select: none; }
        .qubit-label { position: relative; font-weight: 900; font-size: 16px; color: #463438; transition: transform 0.2s; display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; cursor: pointer; user-select: none; }
        .qubit-label:hover { transform: translateY(-2px) scale(1.05); z-index: 50;}
        .qubit-label:active { transform: translateY(2px) scale(0.95); }
        
        .feature-state-1 { border-color: #FFB800 !important; background-color: rgba(255, 184, 0, 0.2); box-shadow: 0 0 10px rgba(255, 184, 0, 0.8); transform: scale(1.1); transition: all 0.2s; }
        .feature-state-0 { border-color: #463438 !important; background-color: rgba(70, 52, 56, 0.2); box-shadow: 0 0 8px rgba(70, 52, 56, 0.8); filter: grayscale(1) brightness(0.85); transform: scale(1.1); transition: all 0.2s; }

        .node.feature-highlight { border-color: #FFB800 !important; box-shadow: 3px 3px 0 #FFB800 !important; z-index: 45 !important; }
        .node.feature-dimmed { background-color: #fff !important; }
        .node.feature-dimmed > img, .node.feature-dimmed > div { opacity: 0.25 !important; }
        .fish-wrapper.feature-dimmed { opacity: 0.25 !important; }

        .circuit-unit { min-width: 50px; height: 180px; display: flex; flex-direction: column; position: relative; cursor: pointer; background-color: transparent !important; background-clip: padding-box; border-left: 0px solid transparent; border-right: 0px solid transparent; transition: background-color 0.2s ease, box-shadow 0.2s ease, border-left-width 0.25s cubic-bezier(0.2, 0.8, 0.2, 1), border-right-width 0.25s cubic-bezier(0.2, 0.8, 0.2, 1), transform 0.2s ease, opacity 0.2s ease; }
        .circuit-unit:hover { background-color: var(--bg-hover, rgba(255, 183, 197, 0.3)) !important; border-radius: 12px; }
        .circuit-unit[data-type="start"]:hover, .circuit-unit[data-type="end"]:hover { background-color: transparent !important; box-shadow: none !important; }
        .circuit-unit.selected-gate { background-color: var(--bg-hover, rgba(255, 183, 197, 0.3)) !important; box-shadow: inset 0 0 0 3px var(--gate-color, #FFB7C5) !important; border-radius: 12px; }
        .control-dot { width: 14px; height: 14px; background: #463438; border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); z-index: 5; }
        .connection-v-line { position: absolute; width: 2.5px; background: #463438; left: 50%; transform: translateX(-50%); z-index: 3; }
        .circuit-target { position: absolute; width: 24px; height: 24px; border-radius: 50%; background: #fff; border: 2.5px solid #463438; left: 50%; transform: translate(-50%, -50%); z-index: 15; }
        .circuit-target::before { content: ""; position: absolute; width: 2.5px; height: 100%; background: #463438; left: 50%; transform: translateX(-50%); }
        .circuit-target::after { content: ""; position: absolute; width: 100%; height: 2.5px; background: #463438; top: 50%; transform: translateY(-50%); }
        .mode-toggle-fixed { position: fixed; top: 20px; right: 20px; width: 70px; height: 70px; background: #ffffff; border: 5px solid #463438; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; box-shadow: 0 4px 0 #463438; z-index: 500; }
        #gate-scroll-area { position: relative; margin-top: 5px; flex: 1; min-height: 0; overflow-y: auto; width: 100%; padding: 5px; scrollbar-width: none; }
        #gate-scroll-area::-webkit-scrollbar { display: none; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(70, 52, 56, 0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #FFF9F0; border: 8px solid #463438; border-radius: 40px; padding: 30px; text-align: center; width: 380px; box-shadow: 0 10px 0 #FFB7C5; color: #463438; }
        .victory-actions, .victory-progress-actions { display: flex; gap: 14px; align-items: center; justify-content: center; }
        .victory-actions { margin-bottom: 16px; }
        .home-btn { width: 150px; border-radius: 60px; display: inline-flex; align-items: center; justify-content: center; white-space: nowrap; }
        .replay-btn { width: 78px; height: 78px; flex: 0 0 78px; border-radius: 50%; padding: 0; display: inline-flex; align-items: center; justify-content: center; margin: 0; }
        .replay-btn svg { width: 38px; height: 38px; filter: drop-shadow(2px 2px 0 #463438); }
        #ios-indicator { position: absolute; top: 0; left: 0; transform: translate(-50%, -120%) scale(0.8); background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border-radius: 50px; padding: 6px 18px; display: flex; align-items: center; box-shadow: 0 8px 24px rgba(70,52,56,0.1); opacity: 0; transition: opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1), transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1000; pointer-events: none; border: 1px solid rgba(70, 52, 56, 0.2); }
        #ios-indicator.active { opacity: 1; transform: translate(-50%, -120%) scale(1); }
        .ind-fraction { color: #463438; font-size: 16px; font-weight: 900; }
        .gate-btn-v2 { position: relative; height: 75px; width: 50px; display: flex; align-items: center; justify-content: center; padding: 0; border: 2px solid #463438; border-radius: 8px; cursor: pointer; transition: all 0.2s; box-shadow: 0 3px 6px rgba(0,0,0,0.1); background-size: 60% 1.5px; background-repeat: no-repeat; background-position: center 15px, center 30px, center 45px, center 60px; }
        .gate-btn-v2:hover { background-color: #FFB7C5 !important; filter: brightness(1.05); transform: scale(1.05); z-index: 10; }
        .btn-highlight { transform: scale(1.15); box-shadow: 0 0 10px rgba(0,0,0,0.3); border: 4px solid #99C44D !important; z-index: 10; filter: brightness(1.1); background-color: #FFB7C5 !important; }
        .hyper-line { stroke: #463438; stroke-width: 0.6; opacity: 0.3; }
        .hyper-line-hi { stroke: #FFB7C5; stroke-width: 2.5; opacity: 1; transition: stroke 0.2s; }
        .gate-btn-v2 .hyper-line-hi { stroke: #f78790; }
        .gate-btn-v2:hover .hyper-line-hi { stroke: #ffffff !important; }
        .btn-highlight .hyper-line-hi { stroke: #ffffff !important; }
        .circuit-unit:hover .hyper-line-hi, .circuit-unit.selected-gate .hyper-line-hi { stroke: #99C44D !important; }
        .gate-v-line { position: absolute; width: 1.5px; background: #463438; left: 50%; transform: translateX(-50%); z-index: 1; }
        .gate-dot { position: absolute; width: 8px; height: 8px; border-radius: 50%; border: 1px solid #463438; left: 50%; transform: translate(-50%, -50%); z-index: 2; }
        .gate-dot.fill { background: #463438; }
        .gate-dot.empty { background: #fff; }
        .gate-target-circle { position: absolute; width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid #463438; background: #fff; left: 50%; transform: translate(-50%, -50%); z-index: 3; }
        .gate-target-circle::before { content: ''; position: absolute; width: 100%; height: 1.5px; top: 50%; left: 0; transform: translateY(-50%); background: #463438; }
        .gate-target-circle::after { content: ''; position: absolute; height: 100%; width: 1.5px; left: 50%; top: 0; transform: translateX(-50%); background: #463438; }
        #canvas-bottom-btns { position: absolute; bottom: 15px; right: 30px; display: flex; gap: 10px; z-index: 100; }
        #canvas-bottom-btns .func-btn { margin-top: 0; width: 85px; font-size: 14px; padding: 8px 5px; text-transform: uppercase; border-width: 3px; }
        .pro-active #canvas-bottom-btns { display: none !important; }
        canvas, .game-canvas, .circuit-unit, .node, .gate-btn-v2 { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; touch-action: manipulation; }
        .swap-active { background: #99C44D !important; box-shadow: 0 0 15px rgba(153, 196, 77, 0.8) !important; height: 8px !important; z-index: 15 !important; border-top: none !important; opacity: 1 !important; }
        #circuit-content .circuit-unit svg { width: 98% !important; height: 98% !important; margin: auto; }
        .drag-target { border-left-width: 35px; position: relative; margin-left: 0; }
        .drag-target.right { border-left-width: 0px; border-right-width: 35px; margin-right: 0; }
        .circuit-unit::before { content: ''; position: absolute; top: 10px; bottom: 10px; width: 4px; background-color: #FFB7C5; border-radius: 4px; z-index: 200; pointer-events: none; opacity: 0; transition: opacity 0.2s ease; }
        .drag-target::before { opacity: 1; left: -19.5px; right: auto; }
        .drag-target.right::before { opacity: 1; left: auto; right: -19.5px; }
        .mode-toggle-inline { width: 44px; height: 44px; background: #ffffff; border: 3px solid #463438; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; box-shadow: 0 3px 0 #463438; transition: all 0.1s; margin-left: 10px; color: #463438; text-shadow: none; padding: 0; }
        .mode-toggle-inline:hover { transform: translateY(-2px); box-shadow: 0 5px 0 #463438; }
        .mode-toggle-inline:active { transform: translateY(2px); box-shadow: 0 1px 0 #463438; }

        }
        .progress-bar-fill::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(45deg, rgba(255,255,255,0.25) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.25) 50%, rgba(255,255,255,0.25) 75%, transparent 75%, transparent);

        @keyframes stripeMove { 0% { background-position: 0 0; } 100% { background-position: 30px 0; } }
        
        .progress-text { position: relative; z-index: 5; font-weight: 900; color: #463438; font-size: 14px; letter-spacing: 1px; }
        
        .progress-thumb {
            position: absolute; top: 50%; left: 0%; transform: translate(-50%, -50%); 
            width: 60px; height: auto;

        }

            position: absolute; right: -25px; top: 50%; transform: translateY(-50%);

            z-index: 15; filter: drop-shadow(2px 2px 0px rgba(70,52,56,0.3)); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .progress-win .progress-bar-fill { background-color: #FFB7C5; }
        .progress-win .progress-target { animation: targetBounce 0.5s infinite alternate; }
        @keyframes targetBounce { 
            0% { transform: translateY(-50%) scale(1); } 
            100% { transform: translateY(-65%) translateX(-5px) scale(1.15) rotate(-10deg); } 
        }
        @media (min-width: 1024px) {body {zoom: 0.9;} }
    </style>

    <script>
        let labelsOpen = false;
        const AVAILABLE_SKINS = ['default', 'rip', 'poto', 'mj'];
        const SKIN_STORAGE_KEY = 'meowtopiaSkin';
        let currentSkin = AVAILABLE_SKINS.includes(sessionStorage.getItem(SKIN_STORAGE_KEY)) ? sessionStorage.getItem(SKIN_STORAGE_KEY) : 'default';
        let currentSidePanel = 'rank';
        
        let featureStates = [null, null, null, null];

        // 精準計算漢明距離
        function getHammingDistance(a, b) {
            let s1 = a.toString(2).padStart(4, '0');
            let s2 = b.toString(2).padStart(4, '0');
            let dist = 0;
            for(let i = 0; i < 4; i++) {
                if (s1[i] !== s2[i]) dist++;
            }
            return dist;
        }

        function toggleFeature(qIndex) {
            if (typeof pop !== 'undefined') { pop.currentTime = 0; pop.play(); }
            
            if (featureStates[qIndex] === null) {
                featureStates[qIndex] = 1; 
            } else if (featureStates[qIndex] === 1) {
                featureStates[qIndex] = 0; 
            } else {
                featureStates[qIndex] = null; 
            }
            
            updateCircuitLabels();
            updateFeatureHighlights();
        }

        function updateFeatureHighlights() {
            let anyActive = featureStates.some(f => f !== null);
            for (let i = 0; i < 16; i++) {
                const n = document.getElementById(`node-${i}`);
                const f = document.getElementById(`fish-${i}`);
                const badge = document.getElementById(`dist-badge-${i}`);
                if (!n) continue;
                
                if (!anyActive) {
                    n.classList.remove('feature-highlight', 'feature-dimmed');
                    if (f) {
                        f.classList.remove('feature-dimmed', 'feature-highlight');
                    }
                    if (badge) badge.classList.add('hidden');
                    continue;
                }
                
                let b = i.toString(2).padStart(4, '0');
                let match = true;
                for (let q = 0; q < 4; q++) {
                    if (featureStates[q] === 1 && b[q] !== '1') match = false;
                    if (featureStates[q] === 0 && b[q] !== '0') match = false;
                }
                
                if (match) {
                    n.classList.add('feature-highlight');
                    n.classList.remove('feature-dimmed');
                    if (f) {
                        f.classList.remove('feature-dimmed');
                        f.classList.add('feature-highlight');
                    }
                    if (badge) {
                        let trueFishPos = fishAtNode.indexOf(i); 
                        badge.innerText = getHammingDistance(i, trueFishPos);
                        badge.classList.remove('hidden');
                    }
                } else {
                    n.classList.remove('feature-highlight');
                    n.classList.add('feature-dimmed');
                    if (f) {
                        f.classList.add('feature-dimmed');
                        f.classList.remove('feature-highlight');
                    }
                    if (badge) badge.classList.add('hidden');
                }
            }
        }

        function getSkinFolder(skin) {
            if (skin === 'rip') return './RIP/';
            if (skin === 'poto') return './poto/';
            if (skin === 'mj') return './mj/';
            return './svg/';
        }
        
        function updateCircuitLabels() {
            const folder = getSkinFolder(currentSkin);
            for(let i=0; i<4; i++) {
                // 1. 更新 Circuit 區域的標籤 (無特效、無按鈕外觀)
                const cLbl = document.getElementById(`q${i}-label`);
                if (cLbl) {
                    if (labelsOpen) {
                        cLbl.innerHTML = isQuantumMode ? `q${i}` : `d${i+1}`;
                    } else {
                        cLbl.innerHTML = `<img src="${folder}dif${i}.png" style="width: 36px; height: 36px; object-fit: contain; padding: 2px;" alt="dif${i}">`;
                    }
                }
                
                // 2. 更新側邊欄的控制按鈕 (帶有徽章與高亮顏色)
                const fLbl = document.getElementById(`feat-toggle-${i}`);
                if (fLbl) {
                    let badge = '';
                    let styleClass = '';
                    
                    if (featureStates[i] === 1) {
                        styleClass = 'feature-state-1';
                        badge = `<div style="position:absolute; top:-6px; right:-6px; background:#FFB800; color:#fff; font-size:12px; font-weight:900; border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; border:2px solid #fff; z-index:10; box-shadow: 1px 1px 0 rgba(70,52,56,0.3);">1</div>`;
                    } else if (featureStates[i] === 0) {
                        styleClass = 'feature-state-0';
                        badge = `<div style="position:absolute; top:-6px; right:-6px; background:#463438; color:#fff; font-size:12px; font-weight:900; border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; border:2px solid #fff; z-index:10; box-shadow: 1px 1px 0 rgba(70,52,56,0.3);">0</div>`;
                    }
                    
                    if (labelsOpen) {
                        fLbl.innerHTML = `<div style="position:relative;"><span class="${styleClass}" style="padding: 2px 6px; display: inline-block; border-radius: 6px; border:2px solid transparent;">${isQuantumMode ? `q${i}` : `d${i+1}`}</span>${badge}</div>`;
                    } else {
                        fLbl.innerHTML = `<div style="position:relative;"><img src="${folder}dif${i}.png" class="${styleClass}" style="width: 36px; height: 36px; object-fit: contain; border-radius: 8px; padding: 2px; border:3px solid transparent;" alt="dif${i}">${badge}</div>`;
                    }
                }
            }
        }

        function updateProgressImages() {
            let catSrc, fishSrc;
            if (currentSkin === 'rip') { catSrc = './RIP/Cat16.png'; fishSrc = './RIP/Fish16.png'; }

        function handleCircuitScroll(e) {
            const circuitWrapper = document.getElementById('circuit-content-wrapper');
            if (!circuitRectCache) circuitRectCache = circuitWrapper.getBoundingClientRect();
            const rect = circuitRectCache;
            const edgeThreshold = 100, maxSpeed = 10;
            let distLeft = e.clientX - rect.left;
            let distRight = rect.right - e.clientX;
            if (distLeft < edgeThreshold && distLeft > -50) {
                let ratio = Math.max(0, 1 - (Math.max(0, distLeft) / edgeThreshold));
                targetScrollSpeed = -(ratio * maxSpeed);
                if (!autoScrollRAF) autoScrollRAF = requestAnimationFrame(scrollLoop);
            } else if (distRight < edgeThreshold && distRight > -50) {
                let ratio = Math.max(0, 1 - (Math.max(0, distRight) / edgeThreshold));
                targetScrollSpeed = (ratio * maxSpeed);
                if (!autoScrollRAF) autoScrollRAF = requestAnimationFrame(scrollLoop);
            } else {
                targetScrollSpeed = 0;
            }
        }

            if (gateScrollArea.scrollHeight > gateScrollArea.clientHeight) {
                let distTop = e.clientY - rect.top;
                let distBottom = rect.bottom - e.clientY;
                if (distTop < edgeThreshold && distTop > -50) {
                    let ratio = Math.max(0, 1 - (Math.max(0, distTop) / edgeThreshold));
                    targetGateScrollSpeed = -(ratio * maxSpeed);

        function getRgba(hex, alpha) {

        function getHighlightPairsForGate(type) {
            let pairs = [];
            if (type.startsWith('X')) {
                pairs = getAllPairs(3 - parseInt(type[1]));
            } else if (type.startsWith('CX')) {
                let ctrlVal = parseInt(type[2]), c = parseInt(type[3]), t = parseInt(type[4]);
                let bit = 1 << (3 - t), cBit = 1 << (3 - c);
                for (let k = 0; k < 16; k++) {
                    if ((k & bit) === 0 && ((k & cBit) >> (3 - c)) === ctrlVal) pairs.push([k, k ^ bit]);
                }
            } else if (type.startsWith('TOF')) {
                let cv1 = parseInt(type[3]), cv2 = parseInt(type[4]), c1 = parseInt(type[5]), c2 = parseInt(type[6]), t = parseInt(type[7]);
                let bit = 1 << (3 - t), b1 = 1 << (3 - c1), b2 = 1 << (3 - c2);
                for (let k = 0; k < 16; k++) {
                    if ((k & bit) === 0 && ((k & b1) >> (3 - c1)) === cv1 && ((k & b2) >> (3 - c2)) === cv2) pairs.push([k, k ^ bit]);
                }
            } else if (type.startsWith('SWAP_')) {
                let p = type.split('_');
                pairs.push([parseInt(p[1]), parseInt(p[2])]);
            }
            return pairs;
        }

        function getMiniHypercubeSVG(type) {
            let pairs = getHighlightPairsForGate(type);
            const miniNodes = nodePositions.map(n => ({ x: n.relX / 12, y: (n.t - baseOffsetY) / 12 }));
            let svg = `<svg viewBox="-10 -15 65 35" style="width:100%; height:100%; pointer-events:none;" preserveAspectRatio="xMidYMid meet">`;
            for(let i=0; i<16; i++) {
                for(let b=0; b<4; b++) {
                    let j = i ^ (1<<b);
                    if(j > i) {
                        let n1 = miniNodes[i], n2 = miniNodes[j];
                        let isHighlighted = pairs.some(p => (p[0]===i && p[1]===j) || (p[0]===j && p[1]===i));
                        let lineClass = isHighlighted ? 'hyper-line-hi' : 'hyper-line';
                        svg += `<line x1="${n1.x}" y1="${n1.y}" x2="${n2.x}" y2="${n2.y}" class="${lineClass}" stroke-linecap="round"/>`;
                    }
                }
            }
            for(let i=0; i<16; i++) {
                let n = miniNodes[i];
                svg += `<circle cx="${n.x}" cy="${n.y}" r="1.5" fill="#463438"/>`;
            }
            svg += `</svg>`;
            return svg;
        }

        function getGateContent(type) {
            if (isQuantumMode) {
                let controls = [], target = -1;
                if (type.startsWith('X')) { target = parseInt(type[1]); } 
                else if (type.startsWith('CX')) { controls.push({ q: parseInt(type[3]), type: parseInt(type[2]) }); target = parseInt(type[4]); } 
                else if (type.startsWith('TOF')) { controls.push({ q: parseInt(type[5]), type: parseInt(type[3]) }); controls.push({ q: parseInt(type[6]), type: parseInt(type[4]) }); target = parseInt(type[7]); }
                else if (type.startsWith('SWAP_')) {
                    let p = type.split('_'), iA = parseInt(p[1]), iB = parseInt(p[2]);
                    target = 3 - Math.round(Math.log2(iA ^ iB));
                    let binary = Math.min(iA, iB).toString(2).padStart(4, '0').split('').map(Number);
                    for (let q = 0; q < 4; q++) if (q !== target) controls.push({ q: q, type: binary[q] });
                }
                let content = '';
                const getY = (q) => 15.7 + q * 15;
                if (controls.length > 0) {
                    const allQs = [target, ...controls.map(c => c.q)];
                    const minQ = Math.min(...allQs), maxQ = Math.max(...allQs);
                    content += `<div class="gate-v-line" style="top:${getY(minQ)}px; height:${(maxQ-minQ)*15}px;"></div>`;
                }
                controls.forEach(ctrl => { content += `<div class="gate-dot ${ctrl.type === 1 ? 'fill' : 'empty'}" style="top:${getY(ctrl.q)}px;"></div>`; });
                content += `<div class="gate-target-circle" style="top:${getY(target)}px;"></div>`;
                return content;
            } else {
                return getMiniHypercubeSVG(type);
            }
        }

            line.style.cssText = `width:${len}px; left:${x1}px; top:${y1}px; transform:rotate(${ang}deg); transform-origin:0 50%;`;

                } else {

                                gyroPermissionGranted = true;

                            }
                        }).catch(console.error);
                    }
                } else if (isTouchDevice && !gyroPermissionGranted) {
                    gyroPermissionGranted = true;
                    window.addEventListener('deviceorientation', handleOrientation);
                }
                if (lineMode === 1) { applyGate(`SWAP_${i}_${j}`); return; }
                if (lineMode === 8) { applyGate(`X${3 - dim}`); return; }

                    const finalLeft = nodePositions[i].l + offset;

                    nL.innerHTML += `
                        <div class="node ${sizeClass}" id="node-${i}" style="top:${nodePositions[i].t}px; left:${finalLeft}px;">
                            <div class="fixed-number">${bin}</div>
                            <img src="./mj/Cat${skinIndex}.png" class="encoded-img" alt="${bin} cat">
                        </div>`;
                    fL.innerHTML += `
                        <div id="fish-${i}" class="fish-wrapper ${sizeClass}" style="top:${nodePositions[i].t}px; left:${finalLeft}px;">
                            <div class="fish-label">${bin}</div>
                            <img src="./mj/Fish${skinIndex}.png" class="fish-img encoded-img" alt="${bin} fish">
                        </div>`;
                    continue;
                }
                let code = `0${bin.slice(2)}`, faded = bin[0] === '1' ? ' bit-faded' : '', catHat = bin[1] === '1' ? `<img src="./svg/hat-c.svg" class="hat-img cat-hat" alt="">` : '';
                const catSrc = `./svg/${code}-c.svg`;
                nL.innerHTML += `<div class="node" id="node-${i}" style="top:${nodePositions[i].t}px; left:${nodePositions[i].l}px;"><div class="fixed-number">${bin}</div>${catHat}<img src="${catSrc}" class="encoded-img${faded}" alt="${bin} cat"></div>`;
                const fishSrc = `./svg/${code}-f.svg`, fishHat = bin[1] === '1' ? `<img src="./svg/hat-f.svg" class="hat-img fish-hat" alt="">` : '';
                fL.innerHTML += `<div id="fish-${i}" class="fish-wrapper"><div class="fish-label">${bin}</div>${fishHat}<img src="${fishSrc}" class="fish-bg-shape encoded-img${faded}" alt=""><img src="${fishSrc}" class="fish-img encoded-img${faded}" alt="${bin} fish"></div>`;
            }
            updateFeatureHighlights(); 
        }

        function handleOrientation(event) {
            if (!lockedLineId || lineMode === 1 || lineMode === 8) return;
            let tilt = event.gamma;
            const orientation = (screen.orientation || {}).type || window.orientation;
            if (orientation === 90 || orientation === "landscape-primary") tilt = event.beta;
            else if (orientation === -90 || orientation === "landscape-secondary") tilt = -event.beta;
            else if (orientation === 180 || orientation === "portrait-secondary") tilt = -event.gamma;
            const now = Date.now();
            if (now - lastSwipeTime < 400) return;
            if (tilt > TILT_THRESHOLD && lastTiltDirection <= 0) {
                currentOptionIndex = (currentOptionIndex + 1) % currentOptions.length;
                lastTiltDirection = 1; lastSwipeTime = now; hasScrolled = true;
                showIndicatorScrolled();
                if ('vibrate' in navigator) navigator.vibrate(20);
            } else if (tilt < -TILT_THRESHOLD && lastTiltDirection >= 0) {
                currentOptionIndex = (currentOptionIndex - 1 + currentOptions.length) % currentOptions.length;
                lastTiltDirection = -1; lastSwipeTime = now; hasScrolled = true;
                showIndicatorScrolled();
                if ('vibrate' in navigator) navigator.vibrate(20);
            } else if (Math.abs(tilt) < RETURN_THRESHOLD) lastTiltDirection = 0;
        }

        window.onload = () => {
            initGameLayout();
            initGates();
            drawStaticLines();
            updateFishUI();
            updateCircuitLabels(); 
            updateUndoStatus();
            fetchLeaderboard();
            timerInterval = setInterval(() => { time++; document.getElementById('timer').innerText = time; }, 1000);
            const circuitWrapper = document.getElementById('circuit-content-wrapper');
            const gateScrollArea = document.getElementById('gate-scroll-area');
            const canvas = document.getElementById('main-canvas');
            const indicator = document.getElementById('ios-indicator');
            
            circuitWrapper.addEventListener('wheel', (e) => {
                if (Math.abs(e.deltaY) > 0) {
                    e.preventDefault();
                    circuitWrapper.scrollLeft += e.deltaY;
                }
            }, { passive: false });

            circuitWrapper.addEventListener('mouseenter', () => { circuitRectCache = circuitWrapper.getBoundingClientRect(); });
            circuitWrapper.addEventListener('dragenter', (e) => {
                circuitRectCache = circuitWrapper.getBoundingClientRect();
                if (draggedIndex !== null) {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                }
            });
            circuitWrapper.addEventListener('mousemove', (e) => { if (draggedIndex === null) handleCircuitScroll(e); });
            circuitWrapper.addEventListener('dragover', (e) => { if (draggedIndex !== null) { e.preventDefault(); handleCircuitScroll(e); } });
            circuitWrapper.addEventListener('mouseleave', () => { targetScrollSpeed = 0; circuitRectCache = null; });
            circuitWrapper.addEventListener('dragleave', () => { targetScrollSpeed = 0; });
            circuitWrapper.addEventListener('drop', () => { targetScrollSpeed = 0; circuitRectCache = null; window.activeDropUnit = null; });
            
            gateScrollArea.addEventListener('mouseenter', () => { gateRectCache = gateScrollArea.getBoundingClientRect(); });
            gateScrollArea.addEventListener('mousemove', handleGateScroll);
            gateScrollArea.addEventListener('mouseleave', () => { targetGateScrollSpeed = 0; gateRectCache = null; });
            
            document.addEventListener('wheel', (e) => {
                if (!lockedLineId || lineMode === 1 || lineMode === 8 || isTouchDevice) return;
                const target = e.target;
                if (!target.closest('#gate-scroll-area') && !target.closest('#circuit-content-wrapper')) {
                    e.preventDefault();
                    if (e.deltaY > 0) currentOptionIndex = (currentOptionIndex + 1) % currentOptions.length;
                    else currentOptionIndex = (currentOptionIndex - 1 + currentOptions.length) % currentOptions.length;
                    hasScrolled = true;
                    showIndicatorScrolled();
                }
            }, { passive: false });

            canvas.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    canvasTouchStartX = e.touches[0].clientX;
                    canvasTouchStartY = e.touches[0].clientY;
                    lastCanvasX = canvasTouchStartX;
                    lastCanvasY = canvasTouchStartY;
                    isCanvasSwiping = false;
                } else if (lockedLineId && e.touches.length >= 2) {
                    e.preventDefault();
                    if (lineMode === 8 && hoverLine) applyGate(`X${3 - hoverLine.dim}`);
                    else if (lineMode === 1 && hoverLine) applyGate(`SWAP_${hoverLine.i}_${hoverLine.j}`);
                    else if (hasScrolled && currentOptions[currentOptionIndex]) applyGate(currentOptions[currentOptionIndex].gateType);
                }
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                if (e.touches.length === 1 && lockedLineId && lineMode !== 1 && lineMode !== 8) {
                    let currentX = e.touches[0].clientX, currentY = e.touches[0].clientY;
                    let diffX = currentX - lastCanvasX, diffY = currentY - lastCanvasY;
                    if (Math.abs(currentX - canvasTouchStartX) > 8 || Math.abs(currentY - canvasTouchStartY) > 8) {
                        isCanvasSwiping = true;
                        if (e.cancelable) e.preventDefault();
                    }
                    if (isCanvasSwiping) {
                        if (Math.abs(diffX) > Math.abs(diffY)) {
                            let steps = Math.floor(Math.abs(diffX) / 80);
                            if (steps > 0) {
                                let dir = diffX > 0 ? 1 : -1;
                                let shift = (dir * steps) % currentOptions.length;
                                currentOptionIndex = (((currentOptionIndex + shift) % currentOptions.length) + currentOptions.length) % currentOptions.length;
                                lastCanvasX += dir * steps * 80;
                                hasScrolled = true;
                                showIndicatorScrolled();
                            }
                        } else {
                            let steps = Math.floor(Math.abs(diffY) / 80);
                            if (steps > 0) {
                                let dir = diffY > 0 ? 1 : -1;
                                let shift = (dir * steps) % currentOptions.length;
                                currentOptionIndex = (((currentOptionIndex + shift) % currentOptions.length) + currentOptions.length) % currentOptions.length;
                                lastCanvasY += dir * steps * 80;
                                hasScrolled = true;
                                showIndicatorScrolled();
                            }
                        }
                    }
                }
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => {
                if (!isCanvasSwiping && lockedLineId && e.changedTouches.length === 1) {
                    const target = document.elementFromPoint(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
                    if (target && !target.classList.contains('connection-line')) {
                        cancelLock();
                    }
                }
                isCanvasSwiping = false;
            });

            canvas.addEventListener('mousemove', (e) => {
                if (indicator.classList.contains('active') && !isTouchDevice) {
                    const rect = canvas.getBoundingClientRect();
                    indicator.style.left = (e.clientX - rect.left) + 'px';
                    indicator.style.top = (e.clientY - rect.top - 25) + 'px';
                }
            });

            canvas.addEventListener('mousedown', (e) => {
                if (lockedLineId && !isTouchDevice) {
                    if (e.button === 0 && !e.target.classList.contains('connection-line')) { 
                        cancelLock(); 
                    }
                }
            });          
            
            canvas.addEventListener('contextmenu', (e) => {
                if (lockedLineId && !isTouchDevice) {
                    e.preventDefault(); 
                    if (lineMode === 8 && hoverLine) applyGate(`X${3 - hoverLine.dim}`);
                    else if (lineMode === 1 && hoverLine) applyGate(`SWAP_${hoverLine.i}_${hoverLine.j}`);
                    else if (currentOptions[currentOptionIndex]) applyGate(currentOptions[currentOptionIndex].gateType);
                }
            });
        };

        var activeRankType = 'steps';
        var rankChampionTimers = [];

        function rankDisplayName(item) { return item.username || item.name || 'Anonymous'; }

        function rankAvatarHtml(item) {
            return item && item.photo ? `<img src="${item.photo}" alt="" style="width:100%;height:100%;object-fit:cover;object-position:${item.photoX||50}% ${item.photoY||50}%;transform-origin:${item.photoX||50}% ${item.photoY||50}%;transform:scale(${item.photoScale||1});">` : '🐱';
        }

        function sortedRankData(type) {
            if (!leaderboardData || leaderboardData.length === 0) return [];
            const secondary = type === 'steps' ? 'time' : 'steps';
            return [...leaderboardData].sort((a, b) => {
                const primaryDiff = Number(a[type] ?? Infinity) - Number(b[type] ?? Infinity);
                if (primaryDiff !== 0) return primaryDiff;
                return Number(a[secondary] ?? Infinity) - Number(b[secondary] ?? Infinity);
            });
        }

        function renderRank(type, silent) {
            activeRankType = type === 'time' ? 'time' : 'steps';
            const tabSteps = document.getElementById('tab-steps'), tabTime = document.getElementById('tab-time'), listArea = document.getElementById('rankList');
            if (tabSteps && tabTime) {
                tabSteps.className = activeRankType === 'steps' ? 'rank-tab active' : 'rank-tab bg-gray-100';
                tabTime.className = activeRankType === 'time' ? 'rank-tab active' : 'rank-tab bg-gray-100';
            }
            const sorted = sortedRankData(activeRankType);
            if (!listArea) return;
            if (sorted.length === 0) { listArea.innerHTML = '<p class="text-center italic text-gray-400 mt-10 text-sm">No records yet</p>'; return; }
            let html = '';
            sorted.slice(0, 10).forEach((item, index) => {
                const displayValue = activeRankType === 'steps' ? item.steps + '🐾' : item.time + 's';
                const crown = index === 0 ? '<span class="rank-crown">👑</span>' : '';
                html += `<div class="rank-item ${index === 0 ? 'rank-champion' : ''}"><div class="rank-player-main"><span class="rank-number">${index + 1}.</span><div class="rank-avatar-wrap">${crown}<div class="rank-avatar-sm">${rankAvatarHtml(item)}</div></div><span class="rank-name">${rankDisplayName(item)}</span></div><span style="flex-shrink:0;color:#5ba4cf;">${displayValue}</span></div>`;
            });
            listArea.innerHTML = html;
            if (!silent) showRankChampion(activeRankType);
        }

        function showRankChampion(type) {
            if (currentSidePanel !== 'rank') return; 
            const wrapper = document.getElementById('leaderboard-wrapper');
            if (wrapper && !wrapper.classList.contains('expanded')) return;
            const champion = sortedRankData(type)[0];
            if (!champion) return;
            rankChampionTimers.forEach(id => clearTimeout(id));
            rankChampionTimers = [];
            let backdrop = document.getElementById('rankChampionBackdrop');
            if (!backdrop) {
                backdrop = document.createElement('div');
                backdrop.id = 'rankChampionBackdrop';
                backdrop.className = 'rank-champion-backdrop';
                document.body.appendChild(backdrop);
            }
            let toast = document.getElementById('rankChampionToast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'rankChampionToast';
                toast.className = 'rank-champion-toast';
                document.body.appendChild(toast);
            }
            const label = type === 'time' ? 'TIME CHAMPION' : 'STEPS CHAMPION';
            const anchor = document.querySelector('#rankList .rank-item.rank-champion') || document.querySelector('#rankList .rank-item');
            const rect = anchor ? anchor.getBoundingClientRect() : { left: 12, top: 110, width: 210, height: 42 };
            toast.style.left = Math.round(rect.left + 8) + 'px';
            toast.style.top = Math.round(rect.top + rect.height / 2) + 'px';
            toast.style.maxWidth = Math.max(220, Math.round(rect.width + 28)) + 'px';
            backdrop.classList.remove('show');
            toast.className = 'rank-champion-toast';
            toast.innerHTML = `<div class="rank-avatar-wrap"><span class="rank-crown">👑</span><div class="rank-avatar-sm">${rankAvatarHtml(champion)}</div></div><div class="rank-champion-text"><span class="rank-champion-label">${label}</span><span class="rank-champion-name">${rankDisplayName(champion)}</span></div>`;
            void toast.offsetWidth;
            backdrop.classList.add('show');
            toast.classList.add('show');
            
            rankChampionTimers.push(setTimeout(() => { toast.classList.remove('show'); backdrop.classList.remove('show'); }, 1700));
        }

        function replayCurrentLevel() {
            window.location.reload();
        }    
    </script>
</body>
</html>
