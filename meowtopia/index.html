<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>Meowtopia</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Titan+One&display=swap" rel="stylesheet">
  <style>
    body { font-family: Arial, sans-serif; background-color: #FFF9F0; background-image: linear-gradient(45deg, #fce4ec 25%, transparent 25%, transparent 50%, #fce4ec 50%, #fce4ec 75%, transparent 75%, transparent); background-size: 100px 100px; color: #463438; }
    .game-title { font-family: 'Titan One', cursive; font-size: 5rem; color: white; -webkit-text-stroke: 3px #463438; text-shadow: 0 0 6px rgba(255,133,161,0.7); letter-spacing: 4px; }
    @keyframes glow { from { text-shadow: 0 0 4px #FF85A1, 0 0 9px #FF85A1; } to { text-shadow: 0 0 6px #A3D36C, 0 0 12px #A3D36C; } }
    .game-btn { cursor: pointer; border: 5px solid #463438; border-radius: 60px; padding: 12px; font-size: 26px; font-weight: 900; color: white; text-shadow: 2px 2px 0 #463438; box-shadow: 0 6px 0 #463438; position: relative; transition: transform 0.15s, box-shadow 0.15s, top 0.1s; text-decoration: none; display: inline-block; text-align: center; }
    .game-btn:hover { transform: translateY(-5px) scale(1.04); box-shadow: 0 11px 0 #463438; }
    .game-btn:active { top: 4px; box-shadow: 0 2px 0 #463438; }
    .btn-red { background: #FFB7C5; } .btn-green { background: #99C44D; } .btn-blue { background: #5BA4CF; }
    #meow-map { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 700px; }
    .player-bar { width: 100%; max-width: 700px; background: white; border: 5px solid #463438; border-radius: 20px; padding: 15px 25px; display: flex; align-items: center; justify-content: space-between; box-shadow: 10px 10px 0px #FFB7C5; }
    .player-avatar { width: 92px; height: 92px; background: #FFF9F0; border: 5px solid #463438; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 900; overflow: hidden; flex-shrink: 0; }
    .player-avatar img { width: 100%; height: 100%; object-fit: cover; transform-origin: center; }
    .map-container { display: grid; grid-template-columns: repeat(6, 1fr); gap: 20px; padding: 20px; }
    .level-node { width: 100px; height: 100px; background: white; border: 5px solid #463438; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; box-shadow: 0 6px 0 #99C44D; cursor: pointer; transition: all 0.3s; text-decoration: none; color: #463438; }
    .level-node:hover:not(.locked) { transform: rotate(5deg) scale(1.1); background: #FFB7C5; color: white; }
    .level-node.locked { background: #eee; color: #bbb; cursor: not-allowed; box-shadow: 0 6px 0 #ccc; border-color: #ccc; }
    #auth-gate { position: fixed; inset: 0; background: rgba(255,250,240,0.95); display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 18px; font-family: Arial, sans-serif; }
    #auth-gate h2 { font-size: 2rem; font-weight: 900; color: #463438; }
    #auth-gate p  { color: #463438; font-weight: bold; font-size: 1.2rem; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
  <div id="auth-gate" style="display:none">
    <div style="font-size:4rem">🔒</div>
    <h2>Login Required</h2>
    <p>You need an account to play!</p>
    <a href="../login.html" class="game-btn btn-red" style="font-size: 1.2rem; padding: 12px 36px;">Go to Login </a>
  </div>
  <h1 class="game-title mb-7 text-center">Meowtopia</h1>
  <div id="meow-map">
    <div class="player-bar mb-5">
      <div class="flex items-center gap-4">
        <div id="meow-player-avatar" class="player-avatar">🐱</div>
        <div>
          <div id="meow-display-username" class="text-2xl font-black">User</div>
          <div class="text-sm font-bold text-gray-400 uppercase tracking-widest">Cat Explorer</div>
        </div>
      </div>
      <div class="text-right">
        <div class="text-sm font-black" style="color:#99C44D">PROGRESS</div>
        <div id="meow-display-level" class="text-4xl font-black">LV. 1</div>
      </div>
    </div>
    <div class="map-container" id="level-grid"></div>
    <div class="flex justify-center gap-6 mt-6">
      <button onclick="playPopThen(() => location.href='../login.html')" class="game-btn btn-blue px-10" style="font-size:18px">Hub</button>
      <button onclick="playPopThen(handleLogout)" class="game-btn btn-red px-10" style="font-size:18px">LOGOUT</button>
    </div>
  </div>
  <script>
    const popAudio = new Audio('pop.m4a');

    function playSound(audio) {
      audio.currentTime = 0;
      audio.play().catch(() => {});
    }

    function playPopThen(callback) {
      playSound(popAudio);
      setTimeout(callback, 120);
    }

    function renderPlayerPhoto() {
      const photo = sessionStorage.getItem('playerPhoto') || localStorage.getItem('playerPhoto');
      const avatar = document.getElementById('meow-player-avatar');
      if (!avatar) return;
      const photoX = sessionStorage.getItem('playerPhotoX') || localStorage.getItem('playerPhotoX') || '50';
      const photoY = sessionStorage.getItem('playerPhotoY') || localStorage.getItem('playerPhotoY') || '50';
      const photoScale = sessionStorage.getItem('playerPhotoScale') || localStorage.getItem('playerPhotoScale') || '1';
      avatar.innerHTML = photo ? `<img src="${photo}" alt="Player photo" style="object-position:${photoX}% ${photoY}%;transform-origin:${photoX}% ${photoY}%;transform:scale(${photoScale});">` : '🐱';
    }

    (function initMeowtopiaMap() {
      const user = sessionStorage.getItem('currentUser');
      showMeowMap(user);
      document.addEventListener('click', event => {
        if (event.target.closest('.level-node:not(.locked)')) {
          playSound(popAudio);
        }
      }, true);
      if (!user) {
        document.getElementById('auth-gate').style.display = 'flex';
        return;
      }
    })();
    function showMeowMap(user) {
      const _ml  = parseInt(sessionStorage.getItem('meow_level'));
      const _cl  = parseInt(sessionStorage.getItem('currentLevel'));
      const meowLv = Math.max(
        isNaN(_ml) ? 1 : _ml,
        isNaN(_cl) ? 1 : _cl,
        1
      );
      document.getElementById('meow-display-username').innerText = user;
      document.getElementById('meow-display-level').innerText    = `LV. ${meowLv}`;
      renderPlayerPhoto();
      const grid = document.getElementById('level-grid');
      grid.innerHTML = '';
      for (let i = 1; i <= 12; i++) {
        const node = document.createElement('a');
        node.className = 'level-node';
        node.innerText = i === 12 ? '?' : i;
        if ((i === 1 || i <= meowLv) && i < 12) {
          node.href = `level${i}.html`;
        } else {
          node.classList.add('locked');
          node.onclick = (e) => {
            e.preventDefault();
            alert('Level Locked! Complete previous stages first.');
          };
        }
        grid.appendChild(node);
      }
    }
    function handleLogout() {
      sessionStorage.clear();
      window.location.href = '../login.html';
    }
  </script>
</body>
</html>
